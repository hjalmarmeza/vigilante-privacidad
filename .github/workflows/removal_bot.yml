name: Privacy Removal Bot

on:
  schedule:
    - cron: '0 3 * * 1' # Ejecutar todos los lunes a las 3:00 AM UTC
  workflow_dispatch: # Permitir ejecución manual para pruebas

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd bot
          npm install

      - name: Execute Removal Script
        run: |
          cd bot
          node index.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: 'legal-protection1'
          SENDER_EMAIL: 'legal.protection1@agentmail.to'
